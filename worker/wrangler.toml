name = "chat-app-worker"
main = "src/index.ts"
compatibility_date = "2025-12-01"
workers_dev = false

[assets]
directory = "../client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[routes]]
pattern = "goodshab.com"
custom_domain = true

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

[[d1_databases]]
binding = "DB"
database_name = "chat-app"
database_id = "056c32c5-3e6d-4375-92aa-4226275f0c97"

[vars]
RTK_PRESET_NAME = "group_call_host"
VAPID_PUBLIC_KEY = "BJJq8hMz6WQxmMxspUy_fZLEIOJ--VSnEjQo3jLs9y9nTedhQfSmTs5tkSIvFf03lBHbFTBaIga14EfWGH04SF8"

# Secrets (set via `wrangler secret put <NAME>`):
# JWT_SECRET
# CF_API_TOKEN
# CF_ACCOUNT_ID
# CF_APP_ID
# VAPID_PRIVATE_KEY
# VAPID_CONTACT   (e.g. "mailto:admin@yourdomain.com")
