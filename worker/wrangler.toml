name = "chat-app-worker"
main = "src/index.ts"
compatibility_date = "2025-12-01"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

[[d1_databases]]
binding = "DB"
database_name = "chat-app"
database_id = "aafd8094-53c1-4e8c-9212-2a4401e12287"

[vars]
RTK_PRESET_NAME = "group_call_host"

# Secrets (set via `wrangler secret put <NAME>`):
# JWT_SECRET
# CF_API_TOKEN
# CF_ACCOUNT_ID
# CF_APP_ID
