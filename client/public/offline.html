<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5865f2" />
    <title>Chat App — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #36393f;
        color: #dcddde;
        font-family: Arial, sans-serif;
        gap: 16px;
        padding: 24px;
        text-align: center;
      }
      img { width: 72px; height: 72px; border-radius: 16px; }
      h1 { font-size: 1.4rem; color: #fff; }
      p  { font-size: 0.95rem; color: #b9bbbe; max-width: 320px; line-height: 1.5; }
      button {
        margin-top: 8px;
        padding: 10px 24px;
        background: #5865f2;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button:hover { background: #4752c4; }
    </style>
  </head>
  <body>
    <img src="/icon-192.png" alt="Chat App" />
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </body>
</html>
